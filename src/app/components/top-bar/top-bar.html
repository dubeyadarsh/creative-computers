<header class="app-header">
  <div class="page-container">
    <div class="header-main">
      
      <!-- Logo -->
      <a routerLink="/" class="brand-logo">
        <mat-icon>layers</mat-icon>
        <span>CREATIVE COMPUTERS</span>
      </a>

      <!-- Search Bar (Strictly hidden on mobile via class) -->
      <div class="search-container hidden-mobile">
        <div class="search-box">
          <input type="text" placeholder="Search products">
          <button class="search-btn">
            <mat-icon>search</mat-icon>
          </button>
        </div>
      </div>

      <!-- Action Icons -->
      <div class="header-actions">
        <a routerLink="/cart" class="action-icon">
          <mat-icon>shopping_cart</mat-icon>
          <span class="badge">0</span>
        </a>
        <a routerLink="/wishlist" class="action-icon hidden-mobile">
          <mat-icon>favorite_border</mat-icon>
        </a>
        <a routerLink="/account" class="action-account">
          <div class="avatar">
            <mat-icon>person_outline</mat-icon>
          </div>
          <span class="hidden-mobile">Account</span>
        </a>
      </div>

    </div>
  </div>
</header>
